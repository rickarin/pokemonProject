<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'dark-amethyst': '#331B58',
              'medium-slate': '#8075FF',
              'lavender-mist': '#F8F0FB',
              'ash-grey': '#CAD5CA',
              'saffron': '#E3B505',
              'background-type' : '#59414c',
            }
          }
        }
      }
    </script>
    <title>Pokedex Hub</title>
</head>
<body class="bg-lavender-mist min-h-screen flex flex-col items-center py-10 px-4">

    <h1 class="text-5xl font-extrabold text-dark-amethyst mb-8 tracking-tight">
        Pokedex Hub
    </h1>

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-2 border-ash-grey">
        <h3 class="text-dark-amethyst font-semibold mb-2">Qual Pokémon você quer encontrar hoje?</h3>
        
        <div class="flex flex-col gap-3">
            <input type="text" id="pesquisar-pokemon" 
                   class="border-2 border-ash-grey rounded-lg p-3 w-full focus:outline-none focus:ring-2 focus:ring-medium-slate transition" 
                   placeholder="Ex: charmander">
            
            <button id="btn-pesquisar" 
                    class="bg-medium-slate text-white font-bold py-3 rounded-lg hover:bg-opacity-90 transform transition hover:scale-105 active:scale-95 shadow-md">
                Pesquisar Pokémon
            </button>
        </div>
    </div>

    <div id="container-resposta" class="hidden mt-10 w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border-2 border-ash-grey flex flex-col items-center gap-4">
        
        <img id="imgPokemon" src="" alt="Pokemon" class="w-40 h-40 object-contain bg-lavender-mist rounded-full p-2 border-2 border-ash-grey">
        
        <h2 class="resposta text-3xl font-bold text-center text-dark-amethyst tracking-tight"></h2>
        
        <div class="flex gap-2 items-center">
            <div id="tipoPokemon" class="flex gap-2">
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
